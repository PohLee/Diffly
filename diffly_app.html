<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Compare</title>
    <style>
        :root {
            --bg: #fff;
            --bg-secondary: #f9fafb;
            --bg-input: #fff;
            --text: #333;
            --text-primary: #111;
            --text-secondary: #374151;
            --text-muted: #6b7280;
            --text-faint: #9ca3af;
            --text-placeholder: #d1d5db;
            --border: #e5e7eb;
            --border-input: #d1d5db;
            --border-focus: #2563eb;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --accent-active: #1e40af;
            --accent-bg: #eff6ff;
            --accent-bg-drag: rgba(239, 246, 255, 0.7);
            --btn-bg: #fff;
            --btn-hover: #f3f4f6;
            --addition-bg: #dcfce7;
            --addition-text: #14532d;
            --addition-mirror: rgba(134, 239, 172, 0.55);
            --deletion-bg: #fee2e2;
            --deletion-text: #7f1d1d;
            --deletion-mirror: rgba(252, 165, 165, 0.55);
            --chunk-border: #f59e0b;
            --empty-side: #d1d5db;
            --summary-identical-bg: #f0fdf4;
            --summary-identical-border: #bbf7d0;
            --summary-diff-bg: #fffbeb;
            --summary-diff-border: #fde68a;
            --summary-del: #dc2626;
            --summary-add: #16a34a;
            --error-bg: #fef2f2;
            --error-border: #fecaca;
            --error-text: #dc2626;
            --badge-identical: #15803d;
            --identical-text: #15803d;
            --collapse-bg: #f9fafb;
            --collapse-text: #9ca3af;
            --collapse-hover: #f3f4f6;
            --collapse-hover-text: #6b7280;
            --sep: #e5e7eb;
            --file-name: #6b7280;
            --clear-btn-text: #6b7280;
            --clear-btn-hover: #374151;
            --output-header-text: #6b7280;
            --nav-btn-text: #374151;
            --nav-btn-disabled-opacity: 0.35;
            --nav-btn-counter: #6b7280;
            --cleanup-option-text: #374151;
            --checkbox-accent: #2563eb;
            --drag-over-bg: rgba(239, 246, 255, 0.7);
        }

        @media (prefers-color-scheme: dark) {
            :root:not([data-theme="light"]) {
                --bg: #111827;
                --bg-secondary: #1f2937;
                --bg-input: #1f2937;
                --text: #d1d5db;
                --text-primary: #e5e7eb;
                --text-secondary: #d1d5db;
                --text-muted: #9ca3af;
                --text-faint: #6b7280;
                --text-placeholder: #4b5563;
                --border: #374151;
                --border-input: #4b5563;
                --border-focus: #3b82f6;
                --accent: #3b82f6;
                --accent-hover: #2563eb;
                --accent-active: #1d4ed8;
                --accent-bg: #1e3a5f;
                --accent-bg-drag: rgba(30, 58, 95, 0.5);
                --btn-bg: #1f2937;
                --btn-hover: #374151;
                --addition-bg: rgba(22, 163, 74, 0.2);
                --addition-text: #86efac;
                --addition-mirror: rgba(22, 163, 74, 0.25);
                --deletion-bg: rgba(220, 38, 38, 0.2);
                --deletion-text: #fca5a5;
                --deletion-mirror: rgba(220, 38, 38, 0.25);
                --chunk-border: #f59e0b;
                --empty-side: #4b5563;
                --summary-identical-bg: rgba(22, 163, 74, 0.1);
                --summary-identical-border: rgba(22, 163, 74, 0.3);
                --summary-diff-bg: rgba(245, 158, 11, 0.1);
                --summary-diff-border: rgba(245, 158, 11, 0.3);
                --summary-del: #fca5a5;
                --summary-add: #86efac;
                --error-bg: rgba(220, 38, 38, 0.1);
                --error-border: rgba(220, 38, 38, 0.3);
                --error-text: #fca5a5;
                --badge-identical: #86efac;
                --identical-text: #86efac;
                --collapse-bg: #1f2937;
                --collapse-text: #6b7280;
                --collapse-hover: #374151;
                --collapse-hover-text: #9ca3af;
                --sep: #374151;
                --file-name: #9ca3af;
                --clear-btn-text: #9ca3af;
                --clear-btn-hover: #d1d5db;
                --output-header-text: #9ca3af;
                --nav-btn-text: #d1d5db;
                --nav-btn-disabled-opacity: 0.35;
                --nav-btn-counter: #9ca3af;
                --cleanup-option-text: #d1d5db;
                --checkbox-accent: #3b82f6;
                --drag-over-bg: rgba(30, 58, 95, 0.5);
            }
        }

        :root[data-theme="dark"] {
            --bg: #111827;
            --bg-secondary: #1f2937;
            --bg-input: #1f2937;
            --text: #d1d5db;
            --text-primary: #e5e7eb;
            --text-secondary: #d1d5db;
            --text-muted: #9ca3af;
            --text-faint: #6b7280;
            --text-placeholder: #4b5563;
            --border: #374151;
            --border-input: #4b5563;
            --border-focus: #3b82f6;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --accent-active: #1d4ed8;
            --accent-bg: #1e3a5f;
            --accent-bg-drag: rgba(30, 58, 95, 0.5);
            --btn-bg: #1f2937;
            --btn-hover: #374151;
            --addition-bg: rgba(22, 163, 74, 0.2);
            --addition-text: #86efac;
            --addition-mirror: rgba(22, 163, 74, 0.25);
            --deletion-bg: rgba(220, 38, 38, 0.2);
            --deletion-text: #fca5a5;
            --deletion-mirror: rgba(220, 38, 38, 0.25);
            --chunk-border: #f59e0b;
            --empty-side: #4b5563;
            --summary-identical-bg: rgba(22, 163, 74, 0.1);
            --summary-identical-border: rgba(22, 163, 74, 0.3);
            --summary-diff-bg: rgba(245, 158, 11, 0.1);
            --summary-diff-border: rgba(245, 158, 11, 0.3);
            --summary-del: #fca5a5;
            --summary-add: #86efac;
            --error-bg: rgba(220, 38, 38, 0.1);
            --error-border: rgba(220, 38, 38, 0.3);
            --error-text: #fca5a5;
            --badge-identical: #86efac;
            --identical-text: #86efac;
            --collapse-bg: #1f2937;
            --collapse-text: #6b7280;
            --collapse-hover: #374151;
            --collapse-hover-text: #9ca3af;
            --sep: #374151;
            --file-name: #9ca3af;
            --clear-btn-text: #9ca3af;
            --clear-btn-hover: #d1d5db;
            --output-header-text: #9ca3af;
            --nav-btn-text: #d1d5db;
            --nav-btn-disabled-opacity: 0.35;
            --nav-btn-counter: #9ca3af;
            --cleanup-option-text: #d1d5db;
            --checkbox-accent: #3b82f6;
            --drag-over-bg: rgba(30, 58, 95, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            padding: 20px;
            background: var(--bg);
            color: var(--text);
            font-size: 14px;
            transition: background 0.2s, color 0.2s;
        }

        .container { max-width: 1400px; margin: 0 auto; }

        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
        h1 { font-size: 1.3rem; font-weight: 600; color: var(--text-primary); }

        /* ── Controls ── */
        .controls {
            display: flex;
            gap: 16px;
            align-items: center;
            margin-bottom: 14px;
            flex-wrap: wrap;
            padding: 10px 14px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 6px;
        }
        .controls-left { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
        .controls-right { margin-left: auto; }
        .control-group { display: flex; align-items: center; gap: 6px; }
        .control-group label { font-weight: 500; font-size: 0.85rem; color: var(--text-secondary); white-space: nowrap; }

        select {
            padding: 4px 8px;
            border: 1px solid var(--border-input);
            border-radius: 4px;
            font-size: 0.85rem;
            background: var(--bg-input);
            color: var(--text);
        }
        select:focus { outline: 2px solid var(--border-focus); outline-offset: 1px; }

        .compare-btn {
            padding: 5px 16px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
        }
        .compare-btn:hover { background: var(--accent-hover); }
        .compare-btn:active { background: var(--accent-active); }

        /* ── Theme toggle ── */
        .theme-btn {
            padding: 4px 8px;
            background: var(--btn-bg);
            border: 1px solid var(--border-input);
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.4;
            transition: background 0.15s, border-color 0.15s;
        }
        .theme-btn:hover { background: var(--btn-hover); }

        /* ── Input section ── */
        .input-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-bottom: 12px;
        }
        .input-panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }
        .input-panel-header h2 { font-size: 0.875rem; font-weight: 600; color: var(--text-secondary); }

        .clear-btn {
            padding: 2px 8px;
            background: transparent;
            color: var(--clear-btn-text);
            border: 1px solid var(--border-input);
            border-radius: 3px;
            cursor: pointer;
            font-size: 0.75rem;
        }
        .clear-btn:hover { background: var(--btn-hover); color: var(--clear-btn-hover); }

        /* ── Textarea + mirror overlay ── */
        /*
         * The mirror is an absolutely-positioned div behind the transparent textarea.
         * It renders the same text with colored backgrounds for diff highlights.
         * color:transparent on the mirror means only backgrounds show — textarea text sits on top.
         */
        .textarea-wrapper { position: relative; }

        .mirror {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            padding: 10px;
            border: 1px solid transparent;
            border-radius: 4px;
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
            font-size: 0.85rem;
            line-height: 1.6;
            white-space: pre-wrap;
            overflow-wrap: break-word;
            overflow: scroll;
            scrollbar-width: none;
            pointer-events: none;
            z-index: 0;
            color: transparent;    /* hide mirror text; only backgrounds visible */
            background: var(--bg-input);
        }
        .mirror::-webkit-scrollbar { display: none; }

        .mirror .mirror-del { background: var(--deletion-mirror); border-radius: 2px; }
        .mirror .mirror-add { background: var(--addition-mirror); border-radius: 2px; }

        textarea {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 200px;
            padding: 10px;
            border: 1px solid var(--border-input);
            border-radius: 4px;
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
            font-size: 0.85rem;
            line-height: 1.6;
            resize: vertical;
            background: transparent;   /* let mirror show through */
            color: var(--text-primary);
            caret-color: var(--text-primary);
        }
        textarea:focus { outline: none; border-color: var(--border-focus); }
        textarea.drag-over { border-color: var(--border-focus); background: var(--drag-over-bg); }

        /* ── File controls ── */
        .file-controls {
            margin-top: 5px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.78rem;
            color: var(--file-name);
        }
        .file-name {
            font-style: italic;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 180px;
        }

        /* ── Summary bar ── */
        .summary-bar {
            display: none;
            align-items: center;
            gap: 10px;
            padding: 6px 12px;
            margin-bottom: 10px;
            border-radius: 5px;
            font-size: 0.82rem;
        }
        .summary-bar.visible { display: flex; }
        .summary-bar.identical { background: var(--summary-identical-bg); border: 1px solid var(--summary-identical-border); }
        .summary-bar.has-diff  { background: var(--summary-diff-bg); border: 1px solid var(--summary-diff-border); }

        .badge-identical { font-weight: 600; color: var(--badge-identical); }
        .summary-del     { color: var(--summary-del); font-weight: 500; }
        .summary-add     { color: var(--summary-add); font-weight: 500; }
        .summary-chars   { color: var(--text-muted); }
        .summary-sep     { color: var(--sep); }

        /* ── Error ── */
        .error-message {
            color: var(--error-text);
            margin-bottom: 10px;
            padding: 8px 12px;
            background: var(--error-bg);
            border: 1px solid var(--error-border);
            border-radius: 4px;
            font-size: 0.85rem;
            display: none;
        }
        .error-message.visible { display: block; }

        /* ── Output wrapper ── */
        .output-wrapper { border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }

        .output-header {
            padding: 7px 12px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--output-header-text);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* collapsed panel: hide content + drop border-bottom from header */
        .output-wrapper.collapsed .output-section { display: none; }
        .output-wrapper.collapsed .output-header  { border-bottom: none; }

        /* fullscreen overlay */
        .output-wrapper.fullscreen {
            position: fixed;
            inset: 0;
            z-index: 9999;
            border-radius: 0;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .output-wrapper.fullscreen .output-section {
            flex: 1;
            overflow-y: auto;
            min-height: 0;
        }

        .output-header-left { display: flex; align-items: center; gap: 6px; }

        .nav-controls { display: flex; align-items: center; gap: 6px; }
        .nav-sep { width: 1px; height: 14px; background: var(--sep); margin: 0 2px; }

        .nav-btn {
            padding: 2px 10px;
            background: var(--btn-bg);
            border: 1px solid var(--border-input);
            border-radius: 3px;
            cursor: pointer;
            font-size: 0.78rem;
            color: var(--nav-btn-text);
            line-height: 1.6;
        }
        .nav-btn:hover:not(:disabled) { background: var(--btn-hover); }
        .nav-btn:disabled { opacity: var(--nav-btn-disabled-opacity); cursor: default; }

        #diff-counter { font-size: 0.78rem; color: var(--nav-btn-counter); min-width: 42px; text-align: center; }

        /* ── Output content ── */
        .output-section {
            padding: 12px;
            min-height: 80px;
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
            font-size: 0.83rem;
        }

        .empty-output {
            color: var(--text-faint);
            font-style: italic;
            text-align: center;
            padding: 20px;
            font-family: inherit;
        }

        /* ── Unchanged / collapsible blocks ── */
        .collapse-block {
            border: 1px solid var(--border);
            border-radius: 4px;
            margin-bottom: 6px;
            overflow: hidden;
        }
        .collapse-toggle {
            width: 100%;
            text-align: left;
            padding: 5px 12px;
            background: var(--collapse-bg);
            border: none;
            cursor: pointer;
            font-size: 0.78rem;
            color: var(--collapse-text);
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 6px;
            user-select: none;
        }
        .collapse-toggle:hover { background: var(--collapse-hover); color: var(--collapse-hover-text); }
        .collapse-icon { font-size: 0.65rem; }

        .collapse-content { border-top: 1px solid var(--border); display: none; }

        .unchanged-text {
            padding: 6px 12px;
            color: var(--collapse-text);
            white-space: pre-wrap;
            overflow-wrap: break-word;
            font-family: inherit;
        }

        .unchanged-inline { margin-bottom: 6px; }

        /* ── Changed chunk ── */
        .diff-chunk {
            border-left: 3px solid var(--chunk-border);
            border-radius: 0 4px 4px 0;
            margin-bottom: 6px;
            overflow: hidden;
        }

        /* Side-by-side layout */
        .sbs-chunk { display: grid; grid-template-columns: 1fr 1fr; }

        .chunk-left {
            border-right: 1px solid var(--border);
            padding: 6px 10px;
            overflow-x: auto;
            background: var(--bg-input);
        }
        .chunk-right {
            padding: 6px 10px;
            overflow-x: auto;
            background: var(--bg-input);
        }

        /* Unified layout */
        .uni-chunk { padding: 4px 10px; background: var(--bg-input); }

        .chunk-content {
            white-space: pre-wrap;
            overflow-wrap: break-word;
            font-family: inherit;
        }

        .addition { background: var(--addition-bg); color: var(--addition-text); }
        .deletion { background: var(--deletion-bg); color: var(--deletion-text); }
        .empty-side { color: var(--empty-side); font-style: italic; font-size: 0.78rem; }

        /* ── Clean-text output containers ── */
        .clean-sbs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            border: 1px solid var(--border);
            border-radius: 4px;
            overflow: hidden;
        }
        .clean-unified {
            padding: 6px 10px;
            border: 1px solid var(--border);
            border-radius: 4px;
        }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .input-section      { grid-template-columns: 1fr; }
            .sbs-chunk          { grid-template-columns: 1fr; }
            .clean-sbs          { grid-template-columns: 1fr; }
            .chunk-left         { border-right: none; border-bottom: 1px solid #e5e7eb; }
        }

        /* ── Cleanup panel ── */
        .cleanup-btn {
            padding: 4px 10px;
            background: var(--btn-bg);
            border: 1px solid var(--border-input);
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary);
            white-space: nowrap;
        }
        .cleanup-btn:hover { background: var(--btn-hover); }
        .cleanup-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }

        .cleanup-panel {
            display: none;
            flex-wrap: wrap;
            gap: 10px 24px;
            padding: 10px 14px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 6px;
            margin-bottom: 14px;
        }
        .cleanup-panel.open { display: flex; }

        .cleanup-option {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 0.85rem;
            color: var(--cleanup-option-text);
            cursor: pointer;
            user-select: none;
        }
        .cleanup-option input[type="checkbox"] {
            width: 14px;
            height: 14px;
            cursor: pointer;
            accent-color: var(--checkbox-accent);
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header-row">
        <h1>Text Compare</h1>
        <button class="theme-btn" id="theme-btn" title="Toggle theme">◐ Auto</button>
    </div>

    <div class="controls">
        <div class="controls-left">
            <div class="control-group">
                <label for="mode-select">Mode:</label>
                <select id="mode-select">
                    <option value="ascii">ASCII (strip non-ASCII)</option>
                    <option value="unicode">Unicode</option>
                </select>
            </div>
            <div class="control-group">
                <label for="granularity-select">Granularity:</label>
                <select id="granularity-select">
                    <option value="line">Line</option>
                    <option value="word">Word</option>
                    <option value="char">Character</option>
                </select>
            </div>
            <div class="control-group">
                <label for="view-select">View:</label>
                <select id="view-select">
                    <option value="sidebyside">Side-by-side</option>
                    <option value="unified">Unified</option>
                </select>
            </div>
            <button class="cleanup-btn" id="cleanup-btn">Clean Up ▼</button>
            <button class="cleanup-btn" id="cleanup-reset-btn" title="Reset all cleanup options">Reset</button>
        </div>
        <div class="controls-right">
            <button class="compare-btn" id="compare-btn">Compare</button>
        </div>
    </div>

    <div id="cleanup-panel" class="cleanup-panel">
        <label class="cleanup-option"><input type="checkbox" id="opt-strip-punct"> Strip punctuation</label>
        <label class="cleanup-option"><input type="checkbox" id="opt-flatten-breaks"> Flatten line breaks</label>
        <label class="cleanup-option"><input type="checkbox" id="opt-collapse-para"> Collapse paragraph breaks</label>
        <label class="cleanup-option"><input type="checkbox" id="opt-collapse-space"> Collapse whitespace</label>
        <label class="cleanup-option"><input type="checkbox" id="opt-case"> Case-insensitive</label>
        <label class="cleanup-option"><input type="checkbox" id="opt-trim"> Trim whitespace</label>
    </div>

    <div id="summary-bar" class="summary-bar"></div>

    <div class="input-section">
        <div class="input-panel">
            <div class="input-panel-header">
                <h2>Text A</h2>
                <button class="clear-btn" onclick="clearPanel('text-a','file-a','file-a-name')">Clear</button>
            </div>
            <div class="textarea-wrapper">
                <div class="mirror" id="mirror-a"></div>
                <textarea id="text-a" placeholder="Paste text here, or drag &amp; drop a file…"></textarea>
            </div>
            <div class="file-controls">
                <input type="file" id="file-a">
                <span class="file-name" id="file-a-name"></span>
            </div>
        </div>

        <div class="input-panel">
            <div class="input-panel-header">
                <h2>Text B</h2>
                <button class="clear-btn" onclick="clearPanel('text-b','file-b','file-b-name')">Clear</button>
            </div>
            <div class="textarea-wrapper">
                <div class="mirror" id="mirror-b"></div>
                <textarea id="text-b" placeholder="Paste text here, or drag &amp; drop a file…"></textarea>
            </div>
            <div class="file-controls">
                <input type="file" id="file-b">
                <span class="file-name" id="file-b-name"></span>
            </div>
        </div>
    </div>

    <div id="error-message" class="error-message"></div>

    <div class="output-wrapper">
        <div class="output-header">
            <div class="output-header-left">
                <button class="nav-btn" id="panel-toggle-btn" title="Collapse/expand panel">▼</button>
                <span>Diff Output</span>
            </div>
            <div class="nav-controls">
                <button class="nav-btn" id="collapse-all-btn" title="Collapse all identical blocks (Alt+C)">Collapse All</button>
                <button class="nav-btn" id="expand-all-btn" title="Expand all identical blocks (Alt+E)">Expand All</button>
                <span class="nav-sep"></span>
                <button class="nav-btn" id="prev-btn" disabled>▲ Prev</button>
                <span id="diff-counter"></span>
                <button class="nav-btn" id="next-btn" disabled>▼ Next</button>
                <span class="nav-sep"></span>
                <button class="nav-btn" id="fullscreen-btn" title="Toggle fullscreen (Esc to exit)">&#x2922;</button>
            </div>
        </div>
        <div id="output" class="output-section">
            <div class="empty-output">Enter text above to compare.</div>
        </div>
    </div>
</div>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
let diffChunks   = [];   // DOM elements with class diff-chunk
let chunkIdx     = -1;
let debounceTimer = null;

// ─── Utilities ────────────────────────────────────────────────────────────────
function escapeHtml(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
}
function showError(msg) {
    const el = document.getElementById('error-message');
    el.textContent = msg;
    el.classList.add('visible');
}
function hideError() {
    const el = document.getElementById('error-message');
    el.textContent = '';
    el.classList.remove('visible');
}
function clearPanel(taId, fileId, nameId) {
    document.getElementById(taId).value   = '';
    document.getElementById(fileId).value = '';
    document.getElementById(nameId).textContent = '';
    scheduleCompare();
}

// ─── File reading ─────────────────────────────────────────────────────────────
function readFile(file) {
    return new Promise((resolve, reject) => {
        const r = new FileReader();
        r.onload  = () => resolve(r.result);
        r.onerror = () => reject(new Error('Failed to read: ' + file.name));
        r.readAsText(file);
    });
}
async function loadFile(file, taId, nameId) {
    if (file.size > 1024 * 1024) {
        if (!confirm('"' + file.name + '" is > 1 MB. Continue?')) return;
    }
    try {
        document.getElementById(taId).value = await readFile(file);
        document.getElementById(nameId).textContent = file.name;
        hideError();
        scheduleCompare();
    } catch (e) { showError(e.message); }
}

function initFileInput(fileId, taId, nameId) {
    document.getElementById(fileId).addEventListener('change', async e => {
        const f = e.target.files[0];
        if (f) await loadFile(f, taId, nameId);
    });
}
function initDragDrop(taId, nameId) {
    const ta = document.getElementById(taId);
    ['dragenter','dragover','dragleave','drop'].forEach(ev =>
        ta.addEventListener(ev, e => { e.preventDefault(); e.stopPropagation(); })
    );
    ta.addEventListener('dragover',  () => ta.classList.add('drag-over'));
    ta.addEventListener('dragleave', () => ta.classList.remove('drag-over'));
    ta.addEventListener('drop', async e => {
        ta.classList.remove('drag-over');
        const f = e.dataTransfer.files[0];
        if (f) await loadFile(f, taId, nameId);
    });
}

initFileInput('file-a', 'text-a', 'file-a-name');
initFileInput('file-b', 'text-b', 'file-b-name');
initDragDrop('text-a', 'file-a-name');
initDragDrop('text-b', 'file-b-name');

// ─── Scroll sync: keep mirror in step with textarea ───────────────────────────
function initScrollSync(taId, mirrorId) {
    const ta     = document.getElementById(taId);
    const mirror = document.getElementById(mirrorId);
    ta.addEventListener('scroll', () => {
        mirror.scrollTop  = ta.scrollTop;
        mirror.scrollLeft = ta.scrollLeft;
    });
}
initScrollSync('text-a', 'mirror-a');
initScrollSync('text-b', 'mirror-b');

// ─── Scroll sync between the two textareas (horizontal + vertical) ────────────
(function() {
    const taA = document.getElementById('text-a');
    const taB = document.getElementById('text-b');
    let syncing = false;
    taA.addEventListener('scroll', () => {
        if (syncing) return;
        syncing = true;
        taB.scrollLeft = taA.scrollLeft;
        taB.scrollTop  = taA.scrollTop;
        syncing = false;
    });
    taB.addEventListener('scroll', () => {
        if (syncing) return;
        syncing = true;
        taA.scrollLeft = taB.scrollLeft;
        taA.scrollTop  = taB.scrollTop;
        syncing = false;
    });
})();

// ─── Text processing ──────────────────────────────────────────────────────────
function processText(text, mode) {
    return mode === 'ascii' ? text.replace(/[^\x00-\x7F]/g, '') : text;
}

// ─── Cleanup options ──────────────────────────────────────────────────────────
function getCleanOpts() {
    return {
        caseInsensitive:   document.getElementById('opt-case').checked,
        collapseParaBreaks: document.getElementById('opt-collapse-para').checked,
        flattenBreaks:     document.getElementById('opt-flatten-breaks').checked,
        stripPunct:        document.getElementById('opt-strip-punct').checked,
        collapseSpace:     document.getElementById('opt-collapse-space').checked,
        trim:              document.getElementById('opt-trim').checked,
    };
}

function applyCleanOpts(text, opts) {
    if (opts.caseInsensitive)    text = text.toLowerCase();
    if (opts.collapseParaBreaks) text = text.replace(/(\r\n|\r|\n){2,}/g, '\n');
    if (opts.flattenBreaks)      text = text.replace(/\r\n|\r|\n/g, ' ');
    if (opts.stripPunct)         text = text.replace(/[^\w\s]/g, ' ');
    if (opts.collapseSpace)      text = text.replace(/\s{2,}/g, ' ');
    if (opts.trim)               text = text.trim();
    return text;
}

function updateCleanupBadge(opts) {
    const count = Object.values(opts).filter(Boolean).length;
    const btn   = document.getElementById('cleanup-btn');
    const open  = document.getElementById('cleanup-panel').classList.contains('open');
    const arrow = open ? '▲' : '▼';
    btn.textContent = count > 0 ? 'Clean Up (' + count + ') ' + arrow : 'Clean Up ' + arrow;
    btn.classList.toggle('active', count > 0);
}

function applyCleanupState() {
    const opts    = getCleanOpts();
    const flatten = opts.flattenBreaks;
    const granSel = document.getElementById('granularity-select');
    const lineOpt = granSel.querySelector('option[value="line"]');
    const colBtn  = document.getElementById('collapse-all-btn');
    const expBtn  = document.getElementById('expand-all-btn');

    if (flatten) {
        lineOpt.disabled = true;
        if (granSel.value === 'line') granSel.value = 'word';
        colBtn.disabled = true;
        expBtn.disabled = true;
    } else {
        lineOpt.disabled = false;
        colBtn.disabled  = false;
        expBtn.disabled  = false;
    }
    updateCleanupBadge(opts);
}

// ─── Diff engine (LCS) — fully local, zero network calls ─────────────────────
function computeLCS(a, b) {
    const m = a.length, n = b.length;
    const dp = Array.from({ length: m + 1 }, () => new Int32Array(n + 1));
    for (let i = 1; i <= m; i++)
        for (let j = 1; j <= n; j++)
            dp[i][j] = a[i-1] === b[j-1]
                ? dp[i-1][j-1] + 1
                : Math.max(dp[i-1][j], dp[i][j-1]);

    const result = [];
    let i = m, j = n;
    while (i > 0 || j > 0) {
        if (i > 0 && j > 0 && a[i-1] === b[j-1]) {
            result.unshift({ type: 'unchanged', value: a[i-1] }); i--; j--;
        } else if (j > 0 && (i === 0 || dp[i][j-1] >= dp[i-1][j])) {
            result.unshift({ type: 'addition', value: b[j-1] }); j--;
        } else {
            result.unshift({ type: 'deletion', value: a[i-1] }); i--;
        }
    }
    return result;
}

function computeDiff(a, b, granularity) {
    switch (granularity) {
        case 'line': return computeLCS(a.split('\n'),     b.split('\n'));
        case 'word': return computeLCS(a.split(/(\s+)/), b.split(/(\s+)/));
        case 'char': return computeLCS(Array.from(a),    Array.from(b));
        default:     return computeLCS(a.split('\n'),     b.split('\n'));
    }
}

// ─── Mirror overlay ───────────────────────────────────────────────────────────
/*
 * For each side we reconstruct that side's original text with highlight <span>s.
 * Left  = unchanged + deletions (what Text A contains)
 * Right = unchanged + additions (what Text B contains)
 * The mirror div has color:transparent so only span backgrounds show through
 * the transparent textarea that sits on top.
 */
function buildMirrorHtml(diff, side, granularity) {
    const isLine = granularity === 'line';
    const parts  = [];

    for (const { type, value } of diff) {
        if (side === 'left'  && type === 'addition') continue;
        if (side === 'right' && type === 'deletion') continue;

        const e = escapeHtml(value);
        if      (type === 'deletion') parts.push('<span class="mirror-del">' + e + '</span>');
        else if (type === 'addition') parts.push('<span class="mirror-add">' + e + '</span>');
        else                          parts.push(e);

        if (isLine) parts.push('\n');
    }
    // Trim trailing separator
    if (isLine && parts.length && parts[parts.length - 1] === '\n') parts.pop();

    return parts.join('');
}

function updateMirrors(diff, granularity) {
    document.getElementById('mirror-a').innerHTML = buildMirrorHtml(diff, 'left',  granularity);
    document.getElementById('mirror-b').innerHTML = buildMirrorHtml(diff, 'right', granularity);
}
function clearMirrors() {
    document.getElementById('mirror-a').innerHTML = '';
    document.getElementById('mirror-b').innerHTML = '';
}

// ─── Segment grouping ─────────────────────────────────────────────────────────
function groupSegments(diff) {
    const segs = [];
    let i = 0;
    while (i < diff.length) {
        const unch = diff[i].type === 'unchanged';
        let j = i + 1;
        while (j < diff.length && (diff[j].type === 'unchanged') === unch) j++;
        segs.push({ type: unch ? 'unchanged' : 'changed', items: diff.slice(i, j) });
        i = j;
    }
    return segs;
}

// ─── Output rendering ─────────────────────────────────────────────────────────
const COLLAPSE_MIN_LINES = 4;   // collapse identical runs >= this many lines

function renderUnchangedSeg(items, granularity) {
    const isLine  = granularity === 'line';
    const count   = items.length;
    const unit    = isLine ? 'line' : granularity === 'word' ? 'word' : 'char';
    const label   = count + ' identical ' + unit + (count === 1 ? '' : 's');
    const content = isLine
        ? items.map(i => escapeHtml(i.value)).join('\n')
        : items.map(i => escapeHtml(i.value)).join('');

    if (isLine && count >= COLLAPSE_MIN_LINES) {
        return '<div class="collapse-block">' +
            '<button class="collapse-toggle" onclick="toggleCollapse(this)">' +
            '<span class="collapse-icon">▶</span>' + label +
            '</button>' +
            '<div class="collapse-content">' +
            '<div class="unchanged-text">' + content + '</div>' +
            '</div></div>';
    }
    return '<div class="unchanged-inline"><div class="unchanged-text">' + content + '</div></div>';
}

function renderChangedSeg(items, viewMode, granularity, id) {
    const isLine = granularity === 'line';

    if (viewMode === 'sidebyside') {
        const lParts = [], rParts = [];
        for (const { type, value } of items) {
            const e = escapeHtml(value);
            if (type === 'deletion') {
                lParts.push('<span class="deletion">' + e + '</span>');
                if (isLine) lParts.push('\n');
            } else {
                rParts.push('<span class="addition">' + e + '</span>');
                if (isLine) rParts.push('\n');
            }
        }
        if (isLine) {
            while (lParts.length && lParts[lParts.length-1] === '\n') lParts.pop();
            while (rParts.length && rParts[rParts.length-1] === '\n') rParts.pop();
        }
        const lHtml = lParts.join('') || '<span class="empty-side">(none)</span>';
        const rHtml = rParts.join('') || '<span class="empty-side">(none)</span>';

        return '<div class="diff-chunk sbs-chunk" id="' + id + '">' +
            '<div class="chunk-left"><div class="chunk-content">'  + lHtml + '</div></div>' +
            '<div class="chunk-right"><div class="chunk-content">' + rHtml + '</div></div>' +
            '</div>';
    }

    // Unified
    let html = '';
    for (const { type, value } of items) {
        const e      = escapeHtml(value);
        const prefix = type === 'deletion' ? '- ' : '+ ';
        const cls    = type === 'deletion' ? 'deletion' : 'addition';
        html += '<span class="' + cls + '">' + prefix + e + '</span>';
        if (isLine) html += '\n';
    }
    return '<div class="diff-chunk uni-chunk" id="' + id + '">' +
        '<div class="chunk-content">' + html + '</div></div>';
}

function renderOutput(diff, viewMode, granularity) {
    const out = document.getElementById('output');

    if (!diff.length) {
        out.innerHTML = '<div class="empty-output">Enter text above to compare.</div>';
        return;
    }
    if (diff.every(d => d.type === 'unchanged')) {
        out.innerHTML = '<div class="empty-output" style="color:#15803d;font-style:normal">' +
            '&#10003; Texts are identical.</div>';
        return;
    }

    let html = '', idx = 0;
    for (const seg of groupSegments(diff)) {
        if (seg.type === 'unchanged') {
            html += renderUnchangedSeg(seg.items, granularity);
        } else {
            html += renderChangedSeg(seg.items, viewMode, granularity, 'dc-' + idx++);
        }
    }
    out.innerHTML = html;
}

// ─── Clean text output rendering ─────────────────────────────────────────────
/*
 * Renders a full-text inline view — both sides show the complete cleaned text
 * with changed words highlighted in place. No chunking, no collapsing.
 * Side-by-side: left = Text A with deletions highlighted; right = Text B with additions.
 * Unified: single flow with both deletion and addition spans inline.
 */
function renderCleanOutput(diff, viewMode) {
    const out = document.getElementById('output');

    if (!diff.length) {
        out.innerHTML = '<div class="empty-output">Enter text above to compare.</div>';
        return;
    }
    if (diff.every(d => d.type === 'unchanged')) {
        out.innerHTML = '<div class="empty-output" style="color:#15803d;font-style:normal">&#10003; Texts are identical.</div>';
        return;
    }

    if (viewMode === 'sidebyside') {
        const lParts = [], rParts = [];
        for (const { type, value } of diff) {
            const e = escapeHtml(value);
            if (type === 'unchanged') {
                lParts.push(e);
                rParts.push(e);
            } else if (type === 'deletion') {
                lParts.push('<span class="deletion">' + e + '</span>');
            } else {
                rParts.push('<span class="addition">' + e + '</span>');
            }
        }
        out.innerHTML =
            '<div class="clean-sbs">' +
                '<div class="chunk-left"><div class="chunk-content">'  + lParts.join('') + '</div></div>' +
                '<div class="chunk-right"><div class="chunk-content">' + rParts.join('') + '</div></div>' +
            '</div>';
    } else {
        let html = '';
        for (const { type, value } of diff) {
            const e = escapeHtml(value);
            if (type === 'unchanged') {
                html += e;
            } else if (type === 'deletion') {
                html += '<span class="deletion">' + e + '</span>';
            } else {
                html += '<span class="addition">' + e + '</span>';
            }
        }
        out.innerHTML = '<div class="clean-unified"><div class="chunk-content">' + html + '</div></div>';
    }
}

// ─── Collapse toggle ───────────────────────────────────────────────────────────
function toggleCollapse(btn) {
    const content = btn.nextElementSibling;
    const icon    = btn.querySelector('.collapse-icon');
    const open    = content.style.display === 'block';
    content.style.display = open ? 'none'  : 'block';
    icon.textContent      = open ? '▶'     : '▼';
}

// ─── Diff navigation ──────────────────────────────────────────────────────────
function collectChunks() {
    diffChunks = Array.from(document.querySelectorAll('.diff-chunk'));
    chunkIdx   = diffChunks.length > 0 ? 0 : -1;
    updateNav();
}

function jumpTo(idx) {
    if (!diffChunks.length) return;
    chunkIdx = ((idx % diffChunks.length) + diffChunks.length) % diffChunks.length;
    diffChunks[chunkIdx].scrollIntoView({ behavior: 'smooth', block: 'center' });
    updateNav();
}

function updateNav() {
    const counter = document.getElementById('diff-counter');
    const prev    = document.getElementById('prev-btn');
    const next    = document.getElementById('next-btn');
    const n       = diffChunks.length;
    if (n === 0) {
        counter.textContent = '';
        prev.disabled = next.disabled = true;
    } else {
        counter.textContent = (chunkIdx + 1) + ' / ' + n;
        prev.disabled = next.disabled = false;
    }
}

document.getElementById('prev-btn').addEventListener('click', () => jumpTo(chunkIdx - 1));
document.getElementById('next-btn').addEventListener('click', () => jumpTo(chunkIdx + 1));

// ─── Panel collapse toggle ─────────────────────────────────────────────────────
(function() {
    const wrapper = document.querySelector('.output-wrapper');
    const btn     = document.getElementById('panel-toggle-btn');
    btn.addEventListener('click', () => {
        const collapsed = wrapper.classList.toggle('collapsed');
        btn.textContent = collapsed ? '▶' : '▼';
    });
})();

// ─── Fullscreen toggle ────────────────────────────────────────────────────────
function setFullscreen(active) {
    const wrapper = document.querySelector('.output-wrapper');
    const btn     = document.getElementById('fullscreen-btn');
    wrapper.classList.toggle('fullscreen', active);
    btn.innerHTML = active ? '&#x2923;' : '&#x2922;';
    document.body.style.overflow = active ? 'hidden' : '';
}
document.getElementById('fullscreen-btn').addEventListener('click', () => {
    setFullscreen(!document.querySelector('.output-wrapper').classList.contains('fullscreen'));
});

// ─── Collapse All / Expand All identical blocks ───────────────────────────────
function collapseAllBlocks() {
    document.querySelectorAll('.collapse-block').forEach(block => {
        block.querySelector('.collapse-content').style.display = 'none';
        block.querySelector('.collapse-icon').textContent = '▶';
    });
}
function expandAllBlocks() {
    document.querySelectorAll('.collapse-block').forEach(block => {
        block.querySelector('.collapse-content').style.display = 'block';
        block.querySelector('.collapse-icon').textContent = '▼';
    });
}
document.getElementById('collapse-all-btn').addEventListener('click', collapseAllBlocks);
document.getElementById('expand-all-btn').addEventListener('click', expandAllBlocks);

// ─── Keyboard shortcuts ───────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
        if (document.querySelector('.output-wrapper.fullscreen')) setFullscreen(false);
        return;
    }
    if (e.altKey && e.key.toLowerCase() === 'c') { e.preventDefault(); collapseAllBlocks(); }
    if (e.altKey && e.key.toLowerCase() === 'e') { e.preventDefault(); expandAllBlocks(); }
});

// ─── Summary bar ──────────────────────────────────────────────────────────────
function updateSummary(diff, granularity) {
    const bar  = document.getElementById('summary-bar');
    const adds = diff.filter(d => d.type === 'addition');
    const dels = diff.filter(d => d.type === 'deletion');

    if (!adds.length && !dels.length) {
        bar.className   = 'summary-bar visible identical';
        bar.innerHTML   = '<span class="badge-identical">&#10003; Exact match — texts are identical</span>';
        return;
    }

    const unit = granularity === 'line' ? 'line' : granularity === 'word' ? 'word' : 'char';
    const pl   = (n, u) => n + ' ' + u + (n === 1 ? '' : 's');
    const addCh = adds.reduce((s, d) => s + d.value.length, 0);
    const delCh = dels.reduce((s, d) => s + d.value.length, 0);

    let html = '<span class="summary-del">&#8722;' + pl(dels.length, unit) + '</span>' +
               '<span class="summary-sep">&#183;</span>' +
               '<span class="summary-add">+' + pl(adds.length, unit) + '</span>';
    if (granularity !== 'char') {
        html += '<span class="summary-sep">&#183;</span>' +
                '<span class="summary-chars">' + (addCh + delCh) + ' chars changed</span>';
    }

    bar.className = 'summary-bar visible has-diff';
    bar.innerHTML = html;
}

// ─── Main compare ─────────────────────────────────────────────────────────────
function runCompare() {
    const textA = document.getElementById('text-a').value;
    const textB = document.getElementById('text-b').value;

    if (!textA && !textB) {
        clearMirrors();
        document.getElementById('output').innerHTML =
            '<div class="empty-output">Enter text above to compare.</div>';
        const bar = document.getElementById('summary-bar');
        bar.className = 'summary-bar'; bar.innerHTML = '';
        diffChunks = []; chunkIdx = -1; updateNav();
        return;
    }

    hideError();
    const mode        = document.getElementById('mode-select').value;
    const granularity = document.getElementById('granularity-select').value;
    const viewMode    = document.getElementById('view-select').value;
    const opts        = getCleanOpts();
    const anyClean    = Object.values(opts).some(Boolean);

    let procA = processText(textA, mode);
    let procB = processText(textB, mode);
    if (anyClean) {
        procA = applyCleanOpts(procA, opts);
        procB = applyCleanOpts(procB, opts);
    }

    const diff = computeDiff(procA, procB, granularity);

    if (anyClean) {
        clearMirrors();
        if (opts.flattenBreaks) {
            renderCleanOutput(diff, viewMode);
        } else {
            renderOutput(diff, viewMode, granularity);
        }
    } else {
        updateMirrors(diff, granularity);
        renderOutput(diff, viewMode, granularity);
    }
    updateSummary(diff, granularity);
    collectChunks();
}

// ─── Auto-compare (debounced) ─────────────────────────────────────────────────
function scheduleCompare() {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(runCompare, 400);
}

document.getElementById('text-a').addEventListener('input', scheduleCompare);
document.getElementById('text-b').addEventListener('input', scheduleCompare);
document.getElementById('mode-select').addEventListener('change', runCompare);
document.getElementById('granularity-select').addEventListener('change', runCompare);
document.getElementById('view-select').addEventListener('change', runCompare);
document.getElementById('compare-btn').addEventListener('click', runCompare);

document.getElementById('cleanup-btn').addEventListener('click', () => {
    document.getElementById('cleanup-panel').classList.toggle('open');
    updateCleanupBadge(getCleanOpts());
});

['opt-strip-punct','opt-flatten-breaks','opt-collapse-para','opt-collapse-space','opt-case','opt-trim'].forEach(id => {
    document.getElementById(id).addEventListener('change', () => {
        applyCleanupState();
        runCompare();
    });
});

document.getElementById('cleanup-reset-btn').addEventListener('click', () => {
    ['opt-strip-punct','opt-flatten-breaks','opt-collapse-para','opt-collapse-space','opt-case','opt-trim'].forEach(id => {
        document.getElementById(id).checked = false;
    });
    applyCleanupState();
    runCompare();
});

// ─── Theme toggle ─────────────────────────────────────────────────────────────
(function() {
    const root = document.documentElement;
    const btn  = document.getElementById('theme-btn');
    const themes = ['auto', 'light', 'dark'];
    const labels = { auto: '◐ Auto', light: '☀ Light', dark: '☾ Dark' };
    const saved  = localStorage.getItem('diffly-theme') || 'auto';

    function apply(theme) {
        if (theme === 'auto') {
            root.removeAttribute('data-theme');
        } else {
            root.setAttribute('data-theme', theme);
        }
        btn.textContent = labels[theme];
        btn.title = 'Current: ' + labels[theme] + ' (click to cycle)';
    }

    apply(saved);

    btn.addEventListener('click', () => {
        const i = (themes.indexOf(localStorage.getItem('diffly-theme') || 'auto') + 1) % themes.length;
        const next = themes[i];
        localStorage.setItem('diffly-theme', next);
        apply(next);
    });
})();
</script>
</body>
</html>
